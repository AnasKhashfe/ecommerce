<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>

    <style>

      body {
        font-family: arial;
        margin: 0;
        padding: 0;
      }

      .send-button{
        background-color: rgb(25,135,84);
        padding: 10px 20px;
        color: white;
        border: none;
        margin-left: 10px;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }


      .chat-input {
        padding: 12px 15px;
        border-width: 1px;
        border-radius: 10px;
        font-size: 15px;
        flex-grow: 1;
        
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin: 0 auto ;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: center;
      }

      .chat-message-robot{
        display: flex;
        align-items: center;
        
      }

      .chat-message-text{
        padding: 15px 20px; 
        background-color: rgb(238,238,238);
        border-radius: 10px;
        margin: 20px 10px ;
        max-width: 300px;
        overflow-wrap: break-word;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width:none;
      }
      

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>


    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>


    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value); 
        }


        function sendMessage() {

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              key: crypto.randomUUID()
            }
          ];

          setChatMessages(newChatMessages)

          const respnose = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: respnose,
              sender: "robot",
              key: crypto.randomUUID()
            }
          ])

          setInputText('')
        }





        return (
          <div 
            className = "chat-input-container">
            <input 
              placeholder = "Send a message to Chatbot" 
              size = "30"
              onChange = {saveInputText}
              value = {inputText} 
              className = "chat-input"
              
            />
            <button
              onClick = {sendMessage}
              className = "send-button"
            >Send</button>
          </div>
        );
      }


      function ChatMessage({ message, sender }){ // instead of using props and after that destructuring
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;
      
      /*  
        if(sender === "robot"){
          return (
            <div>
              <img src="robot.png" width = "50" />
              {message}  
            </div>            
          );
        }
      */      
        return ( // their is an if statment shortcut instead of above if statement it's best to use :)
          <div className = {
            sender === 'user'
              ? 'chat-message-user'
              : 'chat-message-robot'
          }> 
            {sender === 'robot' && (
              <img src="robot.png" width = "50" />
            )}
            <div className = "chat-message-text">
              {message}
            </div> 
            { sender === 'user' && (
              <img src="user.png" width = "50" />
            )}  
          </div>
        );
      }

      function ChatMessages({chatMessages}){

        const chatMessagesRef = React.useRef(null)

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current ;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight ;

          }
        }, [chatMessages])


       return(
          <div className = 'chat-messages-container' ref = {chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message = {chatMessage.message}
                  sender = {chatMessage.sender}
                  key = {chatMessage.id}
                />
              )
            })}
          </div>
        );


      }


      function App() {

        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "Hello",
            sender: "user",
            key: "id1"
          },{
            message: "Hello! How can I help you?",
            sender: "robot",
            key: "id2"
          },{
            message: "flip",
            sender: "user",
            key: "id3"
          },{
            message: "Sure! You got tails",
            sender: "robot",
            key: "id4"
          }
        ]);
        
        // const [chatMessages, setChatMessages] = array ;
        // const chatMessages = array[0];
        // const setChatMessages = array[1];

        return (
          <div className = "app-container">
            <ChatMessages 
            chatMessages = {chatMessages}
            />
            <ChatInput 
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
          </div>
        )
      }

    
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
